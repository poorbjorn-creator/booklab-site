<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Page Not Found — BookLab by Bjorn</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- INCLUDE:head-css -->
<style>
.error-container{max-width:600px;margin:120px auto 80px;padding:0 20px;text-align:center}
.error-code{font-family:'Playfair Display',serif;font-size:6rem;font-weight:900;color:var(--gold);line-height:1}
.error-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--cream);margin:16px 0 12px}
.error-text{color:var(--muted);font-size:1.05rem;margin-bottom:32px}
.error-home{display:inline-block;padding:12px 32px;background:var(--gold);color:var(--bg);font-weight:600;border-radius:var(--radius);text-decoration:none;transition:opacity .2s}
.error-home:hover{opacity:.85}
</style>
</head>
<body>
<!-- INCLUDE:nav -->
<div class="error-container">
<div class="error-code">404</div>
<h1 class="error-title">Page Not Found</h1>
<p class="error-text">This page doesn't exist. It may have been moved or removed.</p>
<a href="/" class="error-home">← Back to BookLab</a>
</div>
<!-- INCLUDE:footer -->
<!-- INCLUDE:nav-js -->
</body>
</html>
