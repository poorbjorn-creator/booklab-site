/* ============================================================
   RENDER ENGINE — don't touch this unless changing layout
   ============================================================ */
(function(){
  var list = document.getElementById('reviewList');
  var countEl = document.getElementById('reviewCount');
  var searchBox = document.getElementById('searchBox');
  var sortSelect = document.getElementById('sortSelect');
  var filterContainer = document.getElementById('filterTags');
  var activeTag = 'all';

  // Build tag list from data
  var tagSet = new Set();
  REVIEWS.forEach(function(r){ r.tags.forEach(function(t){ tagSet.add(t); }); });
  var allTags = Array.from(tagSet).sort();

  // Render filter tags
  var tagHtml = '<span class="filter-tag active" data-tag="all">All</span>';
  allTags.forEach(function(t){
    tagHtml += '<span class="filter-tag" data-tag="'+t+'">'+t.charAt(0).toUpperCase()+t.slice(1)+'</span>';
  });
  filterContainer.innerHTML = tagHtml;

  function stars(n){
    if(n===0) return '<div class="review-rating">Personal Reflection</div>';
    var s='';for(var i=0;i<n;i++)s+='⭐';
    return '<div class="review-rating">'+s+'</div>';
  }

  function render(){
    var q = searchBox.value.toLowerCase().trim();
    var sort = sortSelect.value;

    // Filter
    var filtered = REVIEWS.filter(function(r){
      var matchTag = activeTag==='all' || r.tags.indexOf(activeTag)!==-1;
      var matchSearch = !q || r.title.toLowerCase().indexOf(q)!==-1 || r.author.toLowerCase().indexOf(q)!==-1;
      return matchTag && matchSearch;
    });

    // Sort
    filtered.sort(function(a,b){
      switch(sort){
        case 'newest': return 0; // preserve original order (newest first)
        case 'oldest': return 0; // we'd need dates for true oldest — reverse for now
        case 'rating-high': return b.rating - a.rating;
        case 'rating-low': return a.rating - b.rating;
        case 'title-az': return a.title.localeCompare(b.title);
        case 'title-za': return b.title.localeCompare(a.title);
        default: return 0;
      }
    });
    if(sort==='oldest') filtered.reverse();

    countEl.textContent = filtered.length + ' review' + (filtered.length!==1?'s':'');

    if(filtered.length===0){
      list.innerHTML = '<div class="no-results">No reviews match your search.</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(r){
      html += '<a href="/reviews/'+r.slug+'" class="review-card">';
      html += '<img src="'+r.cover+'" alt="'+r.title+'" onerror="this.outerHTML=\'<span style=\\\'width:60px;height:90px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border-radius:6px;flex-shrink:0;background:linear-gradient(135deg,#222244,rgba(15,52,96,.3));border:1px solid rgba(230,169,25,.15)\\\'>📚</span>\'">';
      html += '<div class="review-info">';
      html += '<div class="review-title">'+r.title+'</div>';
      html += '<div class="review-author">'+r.author+'</div>';
      html += stars(r.rating);
      if(r.snippet) html += '<div class="review-snippet">'+r.snippet+'</div>';
      html += '</div></a>';
    });
    list.innerHTML = html;
  }

  // Events
  searchBox.addEventListener('input', render);
  sortSelect.addEventListener('change', render);
  filterContainer.addEventListener('click', function(e){
    var tag = e.target.dataset.tag;
    if(!tag) return;
    activeTag = tag;
    filterContainer.querySelectorAll('.filter-tag').forEach(function(el){
      el.classList.toggle('active', el.dataset.tag===tag);
    });
    render();
  });

  render();
})();
</script>
